name: Build NVR Firmware

on:
  push:
    branches:
      - master
  workflow_dispatch: # also allow manual trigger from the Actions UI

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write # needed to create/update the rolling release

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain & build dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: |
          # Enable armhf multiarch
          sudo dpkg --add-architecture armhf
          # Restrict the runner's existing sources to amd64 so they don't 404 on armhf
          sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list
          sudo sed -i 's/^deb mirror/deb [arch=amd64] mirror/' /etc/apt/sources.list || true
          # Add ports.ubuntu.com as the armhf source
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/armhf-ports.list
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main universe
          EOF
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf \
            libc6-dev:armhf \
            libcrypt-dev:armhf \
            libncurses-dev bc bison flex libssl-dev \
            u-boot-tools squashfs-tools make gcc git wget

      # ── Caches ───────────────────────────────────────────────────────────────
      # Each source tree / build is cached independently so a change in one
      # (e.g. kernel config) doesn't invalidate the others.

      - name: Cache Linux kernel source
        uses: actions/cache@v4
        with:
          path: build/linux
          key: linux-mstar_v6_5_rebase-${{ hashFiles('config/kernel.config', 'patches/**') }}
          restore-keys: |
            linux-mstar_v6_5_rebase-

      - name: Cache BusyBox source & build
        uses: actions/cache@v4
        with:
          path: build/busybox
          key: busybox-1.36.1-${{ hashFiles('config/busybox.config') }}
          restore-keys: |
            busybox-1.36.1-

      - name: Cache Dropbear source & build
        uses: actions/cache@v4
        with:
          path: build/dropbear
          key: dropbear-2022.83-v3

      - name: Cache zlib source & build
        uses: actions/cache@v4
        with:
          path: |
            build/zlib
            build/sysroot
          key: zlib-1.3.1-v1

      - name: Cache OpenSSH sftp-server build
        uses: actions/cache@v4
        with:
          path: build/openssh
          key: openssh-9.9p1-v1

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build firmware
        run: bash build.sh

      # ── Artifacts ─────────────────────────────────────────────────────────────
      # Flash images and kernel – ready to TFTP-flash via U-Boot
      # ── Rolling GitHub Release ────────────────────────────────────────────────
      # Publishes (or overwrites) the "firmware-latest" release so fw-update
      # can wget the images directly from the device.
      - name: Publish firmware-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-latest
          name: "Latest Firmware"
          body: "Commit: ${{ github.sha }}"
          prerelease: true
          files: |
            output/uImage-chenxing
            output/user-x.squashfs.img

      - name: Write and publish version file
        run: echo "${{ github.sha }}" > output/version

      - name: Add version file to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-latest
          files: output/version

      # USB rootfs directory – tar it first so permissions/symlinks are preserved
      - name: Package USB rootfs
        run: tar -czf output/usb-rootfs.tar.gz -C output usb-rootfs

      - name: Upload USB rootfs
        uses: actions/upload-artifact@v4
        with:
          name: nvr-usb-rootfs-${{ github.sha }}
          path: output/usb-rootfs.tar.gz
          if-no-files-found: error
          retention-days: 30

      # ── Rolling 'latest' release ──────────────────────────────────────────────
      # Keeps a single public 'latest' release whose assets are always the most
      # recent successful build. The board's fw-update script downloads from here.
      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Built from [\`${GITHUB_SHA:0:7}\`]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$GITHUB_SHA) on $(date -u '+%Y-%m-%d %H:%M UTC')"
          TITLE="Latest build — $(date -u '+%Y-%m-%d %H:%M UTC')"
          if gh release view firmware-latest &>/dev/null; then
            gh release edit firmware-latest --title "$TITLE" --notes "$NOTES"
            gh release upload firmware-latest \
              output/uImage-chenxing \
              output/user-x.squashfs.img \
              --clobber
          else
            gh release create firmware-latest \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease \
              output/uImage-chenxing \
              output/user-x.squashfs.img
          fi
